<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite VAR Decision Center</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 750px;
            margin: 0 auto;
            position: relative;
        }
        .header {
            border-bottom: 2px solid #1e293b;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .header h1 {
            color: #38bdf8;
            margin: 0;
            font-size: 28px;
        }
        .match-card {
            background-color: #111827;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }
        .video-box {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            margin-bottom: 20px;
            border: 3px solid #1e293b;
            border-radius: 8px;
            background-color: #000;
        }
        .video-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .btn-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        button {
            background-color: #1f2937;
            color: white;
            border: 1px solid #374151;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        button:hover {
            background-color: #38bdf8;
            color: #0b0f19;
            border-color: #38bdf8;
        }
        
        #loading-screen {
            display: none;
            font-size: 18px;
            color: #f59e0b;
            margin-top: 20px;
            font-style: italic;
        }
        
        #results-container {
            display: none;
            margin-top: 20px;
            animation: fadeIn 0.5s ease-in-out;
        }

        .stadium-screen {
            background-color: #000;
            border: 4px dashed #ef4444;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .stadium-screen h2 {
            color: #ef4444;
            margin: 0 0 10px 0;
            font-size: 18px;
            letter-spacing: 2px;
        }
        .stadium-decision {
            font-size: 32px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 10px #ef4444;
        }

        .bribe-notification {
            background: linear-gradient(135deg, #064e3b 0%, #022c22 100%);
            border: 2px solid #10b981;
            border-radius: 8px;
            padding: 15px;
            text-align: left;
            position: relative;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.7);
        }
        .bribe-title {
            color: #34d399;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }
        .bribe-msg {
            color: #e6f4ea;
            font-style: italic;
            font-size: 15px;
        }

        .next-btn {
            background-color: #10b981;
            color: white;
            width: 100%;
            margin-top: 20px;
            border: none;
        }
        .next-btn:hover {
            background-color: #059669;
            color: white;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🖥️ FIFA VAR Official Assessment</h1>
        <p>Match Protocol: <span id="match-number">1</span>/5</p>
    </div>

    <div class="match-card">
        <h3 id="clip-title">Case Study</h3>
        
        <div class="video-box">
            <iframe id="video-player" src="" frameborder="0" allowfullscreen></iframe>
        </div>

        <div id="controls-area">
            <div class="btn-group">
                <button onclick="submitDecision('Penalty')">Penalty</button>
                <button onclick="submitDecision('No Penalty')">No Penalty</button>
                <button onclick="submitDecision('Red Card')">Red Card</button>
                <button onclick="submitDecision('Handball')">Handball</button>
            </div>
        </div>

        <div id="loading-screen">Consulting room feeds... ⏱️</div>

        <div id="results-container">
            <div class="stadium-screen">
                <h2>STADIUM BIG SCREEN</h2>
                <div class="stadium-decision" id="public-decision">VAR: PENALTY</div>
            </div>

            <div class="bribe-notification">
                <div class="bribe-title">💰 SECURE WIRE INCOMING...</div>
                <div class="bribe-msg" id="private-bribe"></div>
            </div>

            <button class="next-btn" onclick="nextMatch()">Proceed to Next Match →</button>
        </div>
    </div>
</div>

<script>
    const matches = [
        {
            title: "Case Study 1: The 'Salah' Contact vs Egypt",
            videoUrl: "https://www.youtube.com/embed/yrKcr6lUYYQ?autoplay=1&mute=1", 
            publicDecision: "VAR DECISION: PENALTY FOR ARGENTINA",
            bribe: "$100,000 HAS BEEN DEPOSITED INTO YOUR BANK ACCOUNT.<br><b>Message:</b> Keep your mouth shut."
        },
        {
            title: "Case Study 2: De Paul Protecting Messi",
            videoUrl: "https://www.youtube.com/embed/fld1D5A9bcM?autoplay=1&mute=1", 
            publicDecision: "VAR DECISION: PENALTY + RED CARD FOR OPPONENT",
            bribe: "FIRST-CLASS FLIGHTS TO BUENOS AIRES BOOKED FOR YOUR FAMILY.<br><b>Message:</b> You saw absolutely nothing."
        },
        {
            title: "Case Study 3: The Paredes Netherlands Flashpoint",
            videoUrl: "https://www.youtube.com/embed/vFb-Qhxe-fQ?autoplay=1&mute=1", 
            publicDecision: "VAR DECISION: NO FOUL (PLAY ON)",
            bribe: "A BRAND NEW FERRARI HAS ARRIVED AT YOUR HOME ADDRESS.<br><b>Message:</b> Delete the console footage."
        },
        {
            title: "Case Study 4: Controversial Egypt Round of 16 Review",
            videoUrl: "https://www.youtube.com/embed/iyS6TX6FSLo?autoplay=1&mute=1", 
            publicDecision: "VAR DECISION: CLEAN TACKLE (ARGENTINA GOAL STANDS)",
            bribe: "YOU ARE NOW THE DEED-HOLDER OF A PRIVATE ISLAND IN THE CARIBBEAN.<br><b>Message:</b> Camera glitch. Look away."
        },
        {
            title: "Case Study 5: Final Evaluation Screen",
            videoUrl: "https://www.youtube.com/embed/hCvMCyfz8OU?autoplay=1&mute=1", 
            publicDecision: "VAR DECISION: MATCH FORFEITED. ARGENTINA WINS 3-0",
            bribe: "YOU HAVE BEEN APPOINTED HONORARY HEAD OF FIFA LIFE-TIME FINANCES.<br><b>Message:</b> Do not wake up tomorrow asking questions."
        }
    ];

    let currentMatchIndex = 0;

    function loadMatch() {
        const currentMatch = matches[currentMatchIndex];
        document.getElementById('match-number').innerText = currentMatchIndex + 1;
        document.getElementById('clip-title').innerText = currentMatch.title;
        document.getElementById('video-player').src = currentMatch.videoUrl;
        
        document.getElementById('controls-area').style.display = "block";
        document.getElementById('results-container').style.display = "none";
        document.getElementById('loading-screen').style.display = "none";
    }

    function submitDecision(userChoice) {
        document.getElementById('controls-area').style.display = "none";
        const loader = document.getElementById('loading-screen');
        loader.style.display = "block";

        setTimeout(() => {
            loader.style.display = "none";
            const currentMatch = matches[currentMatchIndex];
            
            document.getElementById('public-decision').innerText = currentMatch.publicDecision;
            document.getElementById('private-bribe').innerHTML = currentMatch.bribe;
            
            document.getElementById('results-container').style.display = "block";
        }, 2200);
    }

    function nextMatch() {
        currentMatchIndex++;
        if (currentMatchIndex < matches.length) {
            loadMatch();
        } else {
            document.querySelector('.match-card').innerHTML = `
                <div style="padding: 40px 20px;">
                    <h2 style="color: #10b981; font-size: 32px;">🏆 Assessment Complete</h2>
                    <p style="font-size: 18px; margin-bottom: 30px;">You are officially the most corrupt, highly paid official in football history.</p>
                    <button onclick="location.reload()" style="background-color: #38bdf8; color: #0b0f19; padding: 15px 30px; border: none; font-weight: bold; border-radius: 6px; cursor: pointer;">Re-enter Simulation</button>
                </div>
            `;
        }
    }

    loadMatch();
</script>

</body>
</html>
